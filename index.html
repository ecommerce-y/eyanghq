<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometric Composition</title>
  <style>
    :root {
      --bg: #faf7f3;
      --line: #c6c3be;
      --title: #3a3530;
      --diamond: #843b39;
      --circle: #51638a;
      --thinking: #b8b8b8;
      --panel: #d9d9d9;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      overflow: auto;
    }

    .artboard {
      display: block;
      width: 1728px;
      max-width: 100vw;
      height: auto;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <svg
    class="artboard"
    viewBox="0 0 1728 1082"
    width="1728"
    height="1082"
    xmlns="http://www.w3.org/2000/svg"
    aria-label="Minimal geometric composition"
    role="img"
  >
    <rect x="0" y="0" width="1728" height="1082" fill="var(--bg)" />

    <g stroke="var(--line)" stroke-width="1" fill="none">
      <line x1="577" y1="0" x2="577" y2="146" />
      <line x1="0" y1="146" x2="1728" y2="146" />
      <line x1="577" y1="146" x2="0" y2="723" />
      <line x1="182" y1="541" x2="723" y2="1082" />
    </g>

    <text
      x="70"
      y="47"
      fill="var(--title)"
      font-family="Helvetica Neue, Arial, sans-serif"
      font-size="76"
      font-weight="700"
      letter-spacing="0"
      dominant-baseline="hanging"
    >
      ETHAN YANG
    </text>

    <polygon
      points="351,272 519,441 351,609 183,441"
      fill="var(--diamond)"
      stroke="none"
    />

    <circle cx="181" cy="788" r="65.5" fill="var(--circle)" stroke="none" />

    <text
      x="161"
      y="842"
      fill="var(--thinking)"
      font-family="Baskerville, Georgia, Times New Roman, serif"
      font-size="42"
      font-weight="400"
    >
      thinking?
    </text>

    <rect x="205" y="949" width="270" height="180" fill="var(--panel)" stroke="none" />

    <text
      x="221"
      y="968"
      fill="#000000"
      font-family="Helvetica Neue, Arial, sans-serif"
      font-size="48"
      font-weight="400"
      dominant-baseline="hanging"
    >
      ...|
    </text>
  </svg>
</body>
</html>
