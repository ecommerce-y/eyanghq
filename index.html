<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometric Composition v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Space+Grotesk:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #faf7f3;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: block;
    }

    #composition {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <svg id="composition" role="img" aria-label="Minimal geometric composition"></svg>
  <script type="module" src="./dist/main.js"></script>
</body>
</html>
